version: "3.8"

# Phase 3 services — use with infra + optional legacy api for local RAG dev:
#   docker compose -f docker-compose.infra.yml -f docker-compose.services.yml up -d

services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://futbot:futbot@postgres:5432/futbot
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/oauth/google/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: http://auth:8081
      CHAT_SERVICE_URL: http://chat:8082
      PROJECT_SERVICE_URL: http://project:8083
      INGESTION_SERVICE_URL: http://ingestion:8086
      ORCHESTRATOR_SERVICE_URL: http://rag-orchestrator:8084
      OBSERVABILITY_SERVICE_URL: http://observability:8090
      TOOLS_SERVICE_URL: http://tools:8088
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ANON_MESSAGE_LIMIT: ${ANON_MESSAGE_LIMIT:-10}
    depends_on:
      - auth
      - chat
      - project
      - observability
    ports:
      - "8000:8000"

  rag-orchestrator:
    build:
      context: .
      dockerfile: services/rag_orchestrator/Dockerfile
    env_file:
      - .env
    environment:
      RETRIEVAL_SERVICE_URL: http://retrieval:8085
      TOOLS_SERVICE_URL: http://tools:8088
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TRACE_DB_PATH: /data/trace_logs.db
    depends_on:
      - retrieval
      - llm-gateway
      - tools
    ports:
      - "8084:8084"
    volumes:
      - trace_data:/data

  observability:
    build:
      context: .
      dockerfile: services/observability/Dockerfile
    environment:
      TRACE_DB_PATH: /data/trace_logs.db
    ports:
      - "8090:8090"
    volumes:
      - trace_data:/data

  chat:
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://futbot:futbot@postgres:5432/futbot
      PROJECT_SERVICE_URL: http://project:8083
      LLM_GATEWAY_URL: http://llm-gateway:8087
      ORCHESTRATOR_SERVICE_URL: http://rag-orchestrator:8084
      TOOLS_SERVICE_URL: http://tools:8088
      CONTEXT_BUDGET_TOKENS: ${CONTEXT_BUDGET_TOKENS:-8192}
      AUTO_COMPRESS_THRESHOLD_PCT: ${AUTO_COMPRESS_THRESHOLD_PCT:-85}
    depends_on:
      postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_started
      rag-orchestrator:
        condition: service_started
    ports:
      - "8082:8082"

  llm-gateway:
    build:
      context: .
      dockerfile: services/llm_gateway/Dockerfile
    env_file:
      - .env
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_RATE_LIMIT_RPM: ${LLM_RATE_LIMIT_RPM:-60}
    ports:
      - "8087:8087"

  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: futbot_chunks
      DATA_DIR: /data
    depends_on:
      - qdrant
    ports:
      - "8085:8085"
    volumes:
      - retrieval_data:/data

  tools:
    build:
      context: .
      dockerfile: services/tools/Dockerfile
    env_file:
      - .env
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      LIVESCORE_MCP_URL: ${LIVESCORE_MCP_URL:-https://livescoremcp.com/sse}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      LIVESCORE_MCP_ENABLED: ${LIVESCORE_MCP_ENABLED:-true}
      API_FOOTBALL_MCP_ENABLED: ${API_FOOTBALL_MCP_ENABLED:-true}
    ports:
      - "8088:8088"

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    env_file:
      - .env
    environment:
      RETRIEVAL_SERVICE_URL: http://retrieval:8085
      PROJECT_SERVICE_URL: http://project:8083
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: futbot
      MINIO_SECRET_KEY: futbotminio
      MINIO_BUCKET: futbot-projects
      MINIO_SECURE: "false"
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      - retrieval
      - minio
      - llm-gateway
    ports:
      - "8086:8086"

  project:
    build:
      context: .
      dockerfile: services/project/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://futbot:futbot@postgres:5432/futbot
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: futbot
      MINIO_SECRET_KEY: futbotminio
      MINIO_BUCKET: futbot-projects
      MINIO_SECURE: "false"
      INGESTION_SERVICE_URL: http://ingestion:8086
    depends_on:
      postgres:
        condition: service_healthy
      ingestion:
        condition: service_started
    ports:
      - "8083:8083"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: futbot
      MINIO_ROOT_PASSWORD: futbotminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: futbot
      POSTGRES_PASSWORD: futbot
      POSTGRES_DB: futbot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  minio_data:
  retrieval_data:
  qdrant_data:
  trace_data:
