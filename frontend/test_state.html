<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontend State Tests</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #111; color: #fff; }
    .pass { color: #1ebd53; }
    .fail { color: #d0021b; }
    #log { background: #222; padding: 10px; border-radius: 8px; font-family: monospace; white-space: pre-wrap;}
  </style>
</head>
<body>
  <h1>Frontend State Management Tests</h1>
  <div id="log"></div>

  <script>
    function log(msg, pass=true) {
      const el = document.createElement('div');
      el.className = pass ? 'pass' : 'fail';
      el.textContent = (pass ? '✅ ' : '❌ ') + msg;
      document.getElementById('log').appendChild(el);
    }

    function assertEqual(actual, expected, testName) {
      if (actual === expected) {
        log(testName + ' - Passed');
      } else {
        log(testName + ` - Failed (Expected ${expected}, got ${actual})`, false);
      }
    }

    // --- State Logic to Test ---
    
    // We simulate the logic from app.js to test it in isolation
    let currentSessionId = null;

    function newSession() {
      currentSessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('futbot_session_id', currentSessionId);
      return currentSessionId;
    }

    function init() {
      const stored = localStorage.getItem('futbot_session_id');
      if (!stored) {
        return newSession();
      } else {
        currentSessionId = stored;
        return currentSessionId;
      }
    }

    // --- Tests ---
    try {
      localStorage.removeItem('futbot_session_id');

      // Test 1: New session created on init if empty
      const sess1 = init();
      assertEqual(sess1.startsWith('sess_'), true, 'Test 1: Creates new session if none exists');

      // Test 2: Persists session across re-inits
      const sess2 = init();
      assertEqual(sess1, sess2, 'Test 2: Re-uses existing session from localStorage');

      // Test 3: newSession overrides
      const sess3 = newSession();
      assertEqual(sess3 !== sess1, true, 'Test 3: newSession creates a fresh ID');
      assertEqual(localStorage.getItem('futbot_session_id'), sess3, 'Test 3: new ID is saved to localStorage');

    } catch (e) {
      log('Test execution crashed: ' + e.message, false);
    }
  </script>
</body>
</html>
