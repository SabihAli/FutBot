version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: pytest -v --cov=src --cov-report=term-missing

  api:
    build: .
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
