[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "futbot-common"
version = "0.1.0"
description = "Shared utilities for FutBot microservices"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111.0",
    "pydantic>=2.7.0",
    "starlette>=0.37.0",
    "PyJWT>=2.8.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.2.0", "httpx>=0.27.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["futbot_common*"]
