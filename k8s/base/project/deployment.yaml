apiVersion: v1
kind: Secret
metadata:
  name: project-secret
  namespace: futbot
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://futbot:futbot@postgres:5432/futbot
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: futbot
  MINIO_SECRET_KEY: futbotminio
  MINIO_BUCKET: futbot-projects
  MINIO_SECURE: "false"
  STORAGE_BACKEND: minio
  INGESTION_SERVICE_URL: http://ingestion:8086

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project
  namespace: futbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project
  template:
    metadata:
      labels:
        app: project
    spec:
      containers:
        - name: project
          image: futbot-project:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - secretRef:
                name: project-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: project
  namespace: futbot
spec:
  selector:
    app: project
  ports:
    - port: 8083
      targetPort: 8083
