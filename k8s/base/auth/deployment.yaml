apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: futbot
data:
  ACCESS_TOKEN_MINUTES: "15"
  REFRESH_TOKEN_DAYS: "7"
  GOOGLE_REDIRECT_URI: "http://localhost:8000/auth/oauth/google/callback"

---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: futbot
type: Opaque
stringData:
  JWT_SECRET: dev-secret-change-me
  DATABASE_URL: postgresql+asyncpg://futbot:futbot@postgres:5432/futbot
  REDIS_URL: redis://redis:6379/0
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: futbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: futbot-auth:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: futbot
spec:
  selector:
    app: auth
  ports:
    - port: 8081
      targetPort: 8081
