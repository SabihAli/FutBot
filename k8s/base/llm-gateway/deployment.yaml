apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-secret
  namespace: futbot
type: Opaque
stringData:
  LLM_PROVIDER: local
  GROQ_API_KEY: ""
  LLM_RATE_LIMIT_RPM: "60"
  SNAPSHOT_MAX_TOKENS: "300"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: futbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: llm-gateway
          image: futbot-llm-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          envFrom:
            - secretRef:
                name: llm-gateway-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: futbot
spec:
  selector:
    app: llm-gateway
  ports:
    - port: 8087
      targetPort: 8087
