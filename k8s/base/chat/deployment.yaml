apiVersion: v1
kind: Secret
metadata:
  name: chat-secret
  namespace: futbot
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://futbot:futbot@postgres:5432/futbot
  PROJECT_SERVICE_URL: http://project:8083
  LLM_GATEWAY_URL: http://llm-gateway:8087
  CONTEXT_BUDGET_TOKENS: "8192"
  AUTO_COMPRESS_THRESHOLD_PCT: "85"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: futbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: chat
          image: futbot-chat:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: chat-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: chat
  namespace: futbot
spec:
  selector:
    app: chat
  ports:
    - port: 8082
      targetPort: 8082
